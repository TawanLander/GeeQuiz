<h1>Insira as Novas Informações</h1>
<label>
    Insira seu nome:
    <input id="ipt-nome" type="text">
</label>
<label>
    Insira sua Data de Nascimento:
    <input id="ipt-data" type="date">
</label>
<label>
    Insira seu Gênero:
    <select id="slct-genero">
        <option selected hidden disabled>Selecione</option>
        <option>Masculino</option>
        <option>Feminino</option>
        <option>Prefiro Não Dizer</option>
        <option>Outro</option>
    </select>
</label>
<label>
    Insira seu email:
    <input id="ipt-email" type="text">
</label>
<label>
    Insira sua senha:
    <input id="ipt-senha" type="text">
</label>
